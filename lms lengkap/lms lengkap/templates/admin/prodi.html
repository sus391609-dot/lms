{% extends "_dashboard_base.html" %}
{% block page_title %}Program Studi{% endblock %}
{% block content %}
<div class="grid-2">
    <div class="card">
        <div class="card-title">Daftar Prodi</div>
        <div class="table-wrap">
        <table class="tbl">
            <thead><tr><th>Nama</th><th>Fakultas</th></tr></thead>
            <tbody>
            {% for p in prodi_list %}
                <tr><td>{{ p.nama }}</td><td>{{ p.fakultas }}</td></tr>
            {% endfor %}
            </tbody>
        </table>
        </div>
    </div>
    <div class="card">
        <div class="card-title">Tambah Prodi</div>
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="field"><label>Nama Prodi</label><input type="text" name="nama" required></div>
            <div class="field"><label>Fakultas</label><input type="text" name="fakultas" required></div>
            <button class="btn btn-primary" type="submit">Tambah</button>
        </form>
    </div>
</div>
{% endblock %}
